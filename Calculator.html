<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colorful Pro Calculator</title>
    <style>
        /* CSS: Colors Update */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial', sans-serif; }
        
        body { 
            background: linear-gradient(135deg, #ff0055, #7000ff); /* Pink to Purple Background */
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
        }
        
        .calculator {
            background: #222; /* Dark base for contrast */
            padding: 25px;
            border-radius: 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            width: 340px;
            border: 2px solid #ff0055; /* Red/Pink Border */
        }

        #display {
            width: 100%;
            height: 70px;
            background: #111;
            border: 2px solid #7000ff; /* Purple Border */
            border-radius: 12px;
            color: #fff;
            font-size: 32px;
            text-align: right;
            padding: 15px;
            margin-bottom: 25px;
            outline: none;
            box-shadow: inset 0 0 10px rgba(112, 0, 255, 0.5);
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        button {
            height: 65px;
            border-radius: 12px;
            border: none;
            background: #333;
            color: #fff;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        /* Color Coding */
        button:hover { transform: translateY(-3px); opacity: 0.9; }
        
        .clear { background: #ff0000; } /* Red for Clear */
        .del { background: #ff0055; }   /* Pink for Delete */
        .operator { background: #7000ff; } /* Purple for Operators */
        .equal { 
            background: #ffcc00; /* Yellow for Equal */
            color: #000; 
            grid-column: span 2; 
        }

        .num { background: #444; }
    </style>
</head>
<body>

    <div class="calculator">
        <input type="text" id="display" readonly placeholder="0">
        <div class="buttons">
            <button class="clear" onclick="clearDisplay()">C</button>
            <button class="del" onclick="deleteChar()">DEL</button>
            <button class="operator" onclick="appendToDisplay('/')">/</button>
            <button class="operator" onclick="appendToDisplay('*')">×</button>
            
            <button class="num" onclick="appendToDisplay('7')">7</button>
            <button class="num" onclick="appendToDisplay('8')">8</button>
            <button class="num" onclick="appendToDisplay('9')">9</button>
            <button class="operator" onclick="appendToDisplay('-')">-</button>
            
            <button class="num" onclick="appendToDisplay('4')">4</button>
            <button class="num" onclick="appendToDisplay('5')">5</button>
            <button class="num" onclick="appendToDisplay('6')">6</button>
            <button class="operator" onclick="appendToDisplay('+')">+</button>
            
            <button class="num" onclick="appendToDisplay('1')">1</button>
            <button class="num" onclick="appendToDisplay('2')">2</button>
            <button class="num" onclick="appendToDisplay('3')">3</button>
            <button class="num" onclick="appendToDisplay('.')">.</button>
            
            <button class="num" onclick="appendToDisplay('0')">0</button>
            <button class="equal" onclick="calculate()">=</button>
        </div>
    </div>

    <script>
        const display = document.getElementById('display');

        function appendToDisplay(input) {
            display.value += input;
        }

        function clearDisplay() {
            display.value = "";
        }

        function deleteChar() {
            display.value = display.value.slice(0, -1);
        }

        function calculate() {
            try {
                // Result calculation
                display.value = eval(display.value);
            } catch (error) {
                display.value = "Error";
                setTimeout(clearDisplay, 1000);
            }
        }
    </script>
</body>
</html>
